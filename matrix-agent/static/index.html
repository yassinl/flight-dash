<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1  { color: #ffd700; font-size: 1.8rem; margin-bottom: 0.5rem; }
    p   { color: #888; margin-top: 0.75rem; font-size: 0.95rem; }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .status {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.35rem 0.9rem;
      background: #1b3a1b;
      color: #4caf50;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Flight Dashboard</h1>
    <p>Your LED matrix display is running.</p>
    <p>Configuration controls will appear here in a future update.</p>
    <span class="status">ONLINE</span>
  </div>
</body>
</html>
